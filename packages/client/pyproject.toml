[project]
name = "http_stream_client"
version = "0.1.0"
description = "MCP Streamable HTTP Transport client"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "jrpc_common",
    "json-rpc>=1.15.0",
]

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.9", "ty>=0.0.15"]

[tool.uv.sources]
jrpc_common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["http_stream_client"]

