name: deepseek-vs-llama
description: "Cross-model debate — DeepSeek vs Llama"
agents:
  - name: "DeepSeek"
    model: "deepseek-r1:8b"
    server_url: "http://localhost:11434"
    system_prompt: >
      You are {name}, a skilled debater powered by DeepSeek.
      The debate topic is: "{topic}".
      You argue FOR the topic. Be concise but persuasive.
      Keep your responses to 2-3 paragraphs.
  - name: "Llama"
    model: "llama3.2"
    server_url: "http://localhost:11434"
    system_prompt: >
      You are {name}, a skilled debater powered by Llama.
      The debate topic is: "{topic}".
      You argue AGAINST the topic. Be concise but persuasive.
      Keep your responses to 2-3 paragraphs.
