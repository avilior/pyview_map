services:
  flights-bff:
    image: ghcr.io/avilior/pyview-map-flights-bff:${IMAGE_TAG:-latest}
    ports:
      - "${FLIGHTS_BFF_PORT:-8123}:80"
    environment:
      FLIGHTS_BFF_FLIGHTS_BACKEND_URL: "http://flights-backend/api"
      FLIGHTS_BFF_CALLBACK_URL: "http://flights-bff/api"
      FLIGHTS_BFF_AUTH_TOKEN: "${BFF_AUTH_TOKEN:-tok-acme-001}"
    depends_on:
      flights-backend:
        condition: service_healthy

  places-bff:
    image: ghcr.io/avilior/pyview-map-places-bff:${IMAGE_TAG:-latest}
    ports:
      - "${PLACES_BFF_PORT:-8124}:80"
    environment:
      PLACES_BFF_PLACES_BACKEND_URL: "http://places-backend/api"
      PLACES_BFF_CALLBACK_URL: "http://places-bff/api"
      PLACES_BFF_AUTH_TOKEN: "${BFF_AUTH_TOKEN:-tok-acme-001}"
    depends_on:
      places-backend:
        condition: service_healthy

  places-backend:
    image: ghcr.io/avilior/pyview-map-places-backend:${IMAGE_TAG:-latest}
    ports:
      - "${PLACES_PORT:-8200}:80"
    environment:
      PLACES_BFF_TOKEN: "${BFF_AUTH_TOKEN:-tok-acme-001}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  flights-backend:
    image: ghcr.io/avilior/pyview-map-flights-backend:${IMAGE_TAG:-latest}
    ports:
      - "${FLIGHTS_PORT:-8300}:80"
    environment:
      FLIGHTS_BFF_TOKEN: "${BFF_AUTH_TOKEN:-tok-acme-001}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
